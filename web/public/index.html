<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <link rel="stylesheet" type="text/css" href="styles/grapheditor.css">
  <script src="/plugins/js/plugin.js"></script>
  <link rel='stylesheet' href='Luckysheet/plugins/css/pluginsCss.css' />
	<link rel='stylesheet' href='Luckysheet/plugins/plugins.css' />
	<link rel='stylesheet' href='Luckysheet/css/luckysheet.css' />
	<link rel='stylesheet' href='Luckysheet/assets/iconfont/iconfont.css' />
	<script src="Luckysheet/plugins/js/plugin.js"></script>
  <script src="Luckysheet/plugin.js"></script>
  <script src="Luckysheet/luckysheet.umd.js"></script>
  <script src="appsettings.js"></script>
    
  <script>
    window.$luckysheet = luckysheet
    window.appsettings = appsettings
  </script>
  <title>
    测试用例管理
  </title>
  <style>
    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      /* box-shadow: inset 0px 0px 90px rgba(0, 0, 0, 0.5); */
      margin: 0px;
      padding: 0px;
      position: relative;
    }

    .circle-item {
      width: 100%;
      height: 100%;
      position: absolute;
    }

    .circle-item .inner {
      width: 100%;
      height: 100%;
      border-radius: 100%;
      border: 5px solid rgba(64, 158, 255, 0.7);
      border-right: none;
      border-top: none;
      backgroudn-clip: padding;
      box-shadow: inset 0px 0px 10px rgba(64, 158, 255, 0.15);
    }

    @-webkit-keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .circle-item:nth-of-type(0) {
      transform: rotate(0deg);
    }

    .circle-item:nth-of-type(0) .inner {
      -webkit-animation: spin 2s infinite linear;
      animation: spin 2s infinite linear;
    }

    .circle-item:nth-of-type(1) {
      transform: rotate(70deg);
    }

    .circle-item:nth-of-type(1) .inner {
      -webkit-animation: spin 2s infinite linear;
      animation: spin 2s infinite linear;
    }

    .circle-item:nth-of-type(2) {
      transform: rotate(140deg);
    }

    .circle-item:nth-of-type(2) .inner {
      -webkit-animation: spin 2s infinite linear;
      animation: spin 2s infinite linear;
    }



    .circle-box {
      -webkit-animation: spin 5s infinite linear;
      animation: spin 5s infinite linear;
      width: 100px;
      height: 102px;
      border-radius: 100%;
    }

    .loading-box {
      width: 100px;
      height: 102px;
    }

    .loading-box,
    .loading-text,
    .center-locat {
      position: absolute;
      color: #409eff;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body tabindex="1" style="width:100%;height:100vh;overflow: hidden;">
  <div id="app"></div>
  <script src="/mxClient.js"></script>
</body>


</html>
